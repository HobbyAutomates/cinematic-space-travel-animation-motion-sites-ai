  <script>

    console.error = (...args) => {
      if (typeof args[0] === 'string' && (
        args[0].includes('Each child in a list should have a unique') ||
        args[0].includes('The above error occurred in the') ||
        args[0].includes('Consider adding an error boundary')

      origConsoleError.apply(console, args);

    /* ── Shared Components ── */

    const FadingVideo = ({ src, className, style }) => {
      const videoRef = useRef(null);
      const rAfRef = useRef(null);
      const fadingOutRef = useRef(false);
      const FADE_MS = 500;
      const FADE_OUT_LEAD = 0.55;

      const fadeTo = useCallback((target, duration) => {
        if (rAfRef.current) cancelAnimationFrame(rAfRef.current);
        const video = videoRef.current;
        if (!video) return;
        const start = parseFloat(video.style.opacity) || 0;
        const startTime = performance.now();

        const step = (now) => {
          const elapsed = now - startTime;
          const progress = Math.min(elapsed / duration, 1);
          video.style.opacity = start + (target - start) * progress;
          if (progress < 1) {
            rAfRef.current = requestAnimationFrame(step);
          }
        };
        rAfRef.current = requestAnimationFrame(step);
      }, []);

      useEffect(() => {
        const video = videoRef.current;
        if (!video) return;

        const onLoaded = () => {
          video.style.opacity = 0;
          video.play().catch(() => {});
          fadeTo(1, FADE_MS);
        };

        const onTimeUpdate = () => {
          if (!fadingOutRef.current && video.duration && video.duration - video.currentTime <= FADE_OUT_LEAD && video.duration - video.currentTime > 0) {
            fadingOutRef.current = true;
            fadeTo(0, FADE_MS);
          }
        };

        const onEnded = () => {
          video.style.opacity = 0;
          setTimeout(() => {
            video.currentTime = 0;
            video.play().catch(() => {});
            fadingOutRef.current = false;
            fadeTo(1, FADE_MS);
          }, 100);
        };

        video.addEventListener('loadeddata', onLoaded);
        video.addEventListener('timeupdate', onTimeUpdate);
        video.addEventListener('ended', onEnded);

        return () => {
          if (rAfRef.current) cancelAnimationFrame(rAfRef.current);
          video.removeEventListener('loadeddata', onLoaded);
          video.removeEventListener('timeupdate', onTimeUpdate);
          video.removeEventListener('ended', onEnded);
        };
      }, [fadeTo]);

      return (
        <video
          ref={videoRef}
          src={src}
          autoPlay
          muted
          playsInline
          preload="auto"
          className={className}
          style={{ ...style, opacity: 0 }}
        />
      );
    };

    const BlurText = ({ text, className, justify }) => {

              initial={{ filter: 'blur(10px)', opacity: 0, y: 50 }}

                opacity: [0, 0.5, 1],
                y: [50, -5, 0],
              } : {}}
              transition={{
                duration: 0.7,
                times: [0, 0.5, 1],
                ease: 'easeOut',
                delay: (i * 100) / 1000,
              }}
              style={{ display: 'inline-block', marginRight: '0.28em' }}

                </div>
              </motion.div>
            </div>

            <motion.div

              animate={{ filter: 'blur(0px)', opacity: 1, y: 0 }}

                ))}

    const PortfolioSection = () => {

      const projects = [
        {
          number: '01',

          type: 'Custom AI Software',
          tags: ['Enterprise', 'Floor Plans', 'AI Pipeline', 'Production'],
          description: 'Enterprise floor plan platform for India\'s leading furniture manufacturer. Hand sketches converted to production-ready layouts through a custom AI pipeline.',

        {
